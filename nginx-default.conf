server {
    listen 80;

    # --- Serve React Frontend (static files) ---
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # --- Proxy API calls to Spring Boot (internal, never hits the internet) ---
    location /api/ {
        proxy_pass http://localhost:10007/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # --- Proxy Spring Boot Actuator (optional, for health checks) ---
    location /actuator/ {
        proxy_pass http://localhost:10007/actuator/;
        proxy_set_header Host $host;
    }
}
